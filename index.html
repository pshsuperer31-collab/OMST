<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oriental Mind Scan Test</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- personality_analyzer.js: 파일 없음, 기능 비활성 -->
    <style>
    :root { 
        --navy: #002D62; 
        --bg-light: #ffffff; 
        --text-dark: #2c3e50; 
        /* 시스템 기본 폰트 설정 (따로 저장 안 해도 나오는 폰트) */
        --font-main: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-serif: "AppleMyungjo", "Apple Myungjo", "NanumMyeongjo", "Nanum Myeongjo", "Batang", "serif";
    }

    /* 1. 화면 전체를 중앙으로 정렬하는 바디 설정 */
body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center; /* 세로 중앙 */
    align-items: center;     /* 가로 중앙 */
    min-height: 100vh;      /* 화면 높이 100% 사용 */
    background-color: #f8f9fa;
}

 /* 2. 퀴즈 박스 (크기 키우고 중앙 배치) */
.container {
    width: 95%;             /* 모바일 대응 */
    max-width: 700px;       /* [수정] 600px에서 700px로 크기 확장 */
    margin: 40px auto;      /* 상하 여백 부여 */
    background: #fff;
    padding: 40px;          /* 내부 여백도 더 시원하게 */
    border-radius: 30px;    /* 모서리를 더 부드럽게 */
    box-shadow: 0 20px 50px rgba(0,0,0,0.1); /* 그림자를 더 깊게 해서 입체감 부여 */
    text-align: center;
    
    /* 혹시 모를 잘림 방지 */
    box-sizing: border-box; 
    display: block;         /* important 제거됨 */
}

/* 3. 시작 페이지도 중앙 정렬 유지 */
#start-page {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
}

    /* 2. 헤더 내부의 위쪽 여백 줄이기 (50px -> 10px) */
#quiz-ui .header {
    padding-top: 10px !important; /* 로고 바로 위 여백 */
    margin-bottom: 30px; 
    text-align: center;
}

/* 3. 결과 영역의 헤더도 동일하게 적용 */
#result-area .header {
    padding-top: 10px !important;
    min-height: 0; /* 불필요한 높이 제거 */
}

    /* [수정] 로고 영역 스타일 */
    .header {
        width: 100%;
        padding: 40px 0 20px 0;
        text-align: center;
        background: #fff;
    }
    
  /* ANALYSIS REPORT 글자 완전 제거 */
    .header h1, .header p { 
        display: none !important; 
    }

.header p { 
    display: none; /* 서브 타이틀 강제 숨김 */

    /* [추가] 로고 이미지 스타일: 중앙에 땋! 위치하고 크기 조절 */
logo-area img {
        width: 100%;
        max-width: 420px;
        height: auto;
        display: block;
        margin: 0 auto;
    }
}

    .logo-img { width: 120px; height: auto; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
    .logo-img:hover { transform: scale(1.05); }

    /* [Mobile Optimization] */

    /* 모바일 전용 로고 크기 조정 */
@media (max-width: 600px) {
    .header { padding: 40px 0 20px 0; }
    .logo-area img { max-width: 280px; } /* 모바일에서는 화면에 맞게 */
}
    @media (max-width: 600px) {
        .container { padding: 25px 18px !important; width: 94% !important; }
        .header h1 { font-size: 2.2rem !important; }
        .header p { font-size: 0.95rem !important; letter-spacing: 3px !important; }
        .res-symbol { font-size: 4.8rem !important; } /* 괘 이미지 대폭 확대 */
        .res-hex-title { font-size: 2.4rem !important; }
        .res-binary { font-size: 0.9rem !important; }
        
        /* 8단계 프로필 및 상세 카드 그리드 강제 2열 */
        .mobile-grid-2 { 
            display: grid !important; 
            grid-template-columns: 1fr 1fr !important; 
            gap: 10px !important; 
        }
        .compact-card { padding: 15px !important; }
        .compact-font { font-size: 0.82rem !important; line-height: 1.5 !important; }
        .compact-title { font-size: 0.8rem !important; margin-bottom: 4px !important; }
    }

    /* [나침반 바늘 & 프로그레스 바] 바늘 움직임 텐션 추가 */
    .progress-wrapper { 
        position: relative; 
        width: 100%; 
        margin: 60px 0 40px 0;
    }
    .progress-container { 
        width: 100%; 
        height: 12px; 
        background: #eee; 
        border-radius: 10px; 
        overflow: hidden; 
    }
   /* [수정 후 - 하늘색 처방] */
.progress-fill {
    height: 100%;
    /* 🎨 원장님이 원하시는 화사한 스카이 블루 */
    background-color: #3498DB; 
    
    /* [디테일] 입체감을 살짝 주는 그라데이션 (옵션) */
    background-image: linear-gradient(90deg, #3498DB 0%, #5DADE2 100%);
    
    width: 0%;
    border-radius: 10px; /* 모서리도 둥글게 */
    
    /* 쫀득하고 부드러운 움직임을 주는 텐션 값 */
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    
    box-shadow: 0 2px 5px rgba(52, 152, 219, 0.3); /* 은은한 파란 그림자 */
}
    
    .arrow-indicator {
        position: absolute;
        top: -45px;
        left: 0%; /* JS가 이 값을 0% -> 100%로 바꿀 겁니다 */
        transform: translateX(-50%);
        font-size: 32px;
        /* 나침반 바늘처럼 쫀득한 움직임을 주는 텐션 값 */
        transition: left 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); 
        animation: bounce 1.8s infinite;
        z-index: 10;
    }

    @keyframes bounce {
        0%, 100% { transform: translate(-50%, 0); }
        50% { transform: translate(-50%, -10px); }
    }

    /* 2. 질문 영역: 긴 글도 예쁘게 담는 그릇 */
    .q-text { 
        font-family: var(--font-apple-serif); 
        font-size: 1.8rem; 
        font-weight: 600; 
        color: #1a1a1a; 
        line-height: 1.7; /* 행간을 아주 미세하게 줄여 긴 문장의 이질감 해소 */
        letter-spacing: -0.3px; 
        word-break: keep-all; 
        /* 고정 높이 대신 최소 높이만 설정하고 나머지는 유연하게 */
        min-height: 180px; 
        height: auto; 
        padding: 20px 30px 40px 30px; /* 아래쪽 여백을 더 줘서 옵션과 분리 */
        margin-bottom: 45px;
        display: flex; 
        align-items: center; 
        justify-content: center; 
        -webkit-font-smoothing: antialiased;
    }

    /* 질문 텍스트 정렬 */
#question-text {
    text-align: center;
    word-break: break-word; /* 모바일에서 깨짐 방지용 기본 설정 전환 */
    line-height: 1.6;
    margin-bottom: 30px;
}

/* 버튼들을 감싸는 영역을 중앙 정렬 */
#options-container {
    display: flex;
    flex-direction: column; /* 세로로 배치 */
    align-items: center;    /* 가운데 정렬 */
    gap: 15px;              /* 버튼 사이 간격 */
    width: 100%;
}

/* 버튼 자체의 스타일 수정 */
.option-btn {
    width: 100%;
    max-width: 400px;       /* 버튼이 너무 길어지지 않게 제한 */
    text-align: center;
    justify-content: center; /* 내부 텍스트 중앙 */
    transition: all 0.3s ease;
}

.option-btn:hover, .option-btn:active {
    background-color: #3498DB !important;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
}

/* 성별 선택 토글 버튼 */
.gender-group {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
    margin-bottom: 30px;
}

.gender-btn {
    flex: 1;
    max-width: 120px;
    padding: 15px;
    border: 2px solid #eee;
    border-radius: 15px;
    background: #fff;
    color: #888;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
}

.gender-btn.active {
    border-color: #002D62;
    background: #002D62;
    color: #fff;
    box-shadow: 0 5px 15px rgba(0, 45, 98, 0.2);
}

.gender-btn:hover:not(.active) {
    background: #f0f4f8;
    border-color: #3498DB;
    color: #3498DB;
}

    /* 3. 옵션 버튼 사이의 간격 조정 */
    .options { 
        display: grid; 
        gap: 10px; 
        max-width: 550px; 
        margin: 0 auto 30px auto; /* 하단 이전버튼과 간격 확보 */
    }
    .opt-btn { padding: 18px; border: 1.5px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.2s; font-size: 1.15rem; background: #fff; font-weight: 600; }
    .opt-btn:hover { border-color: #3498DB; background: #f0f4f8; color: #3498DB; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52,152,219,0.1); }

    /* 결과 페이지 디자인 */
    #result-area {
    display: none; /* 기본은 숨김 */
    width: 100%;
    height: auto !important; /* 높이 제한 해제 */
    min-height: 100vh;
    overflow-y: visible !important; /* 내용이 넘치면 무조건 보여줌 */
    padding-bottom: 50px; /* 맨 밑 버튼이 바닥에 붙지 않게 여백 */
}
/* 리포트 몸통 */
#report-body {
        display: flex;
        flex-direction: column; /* 위에서 아래로 */
        align-items: center;
    }

    #report-body > div {
        width: 100%; /* 각 섹션이 가로를 꽉 채우며 순서대로 배치됨 */
    }
    .result-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: center; margin-bottom: 30px; }

    /* 1. 수식어(질서를 바로잡는...) 크기 키우기 */
    .result-subtitle { 
        font-family: var(--font-serif); 
        font-size: 1.75rem; /* 아주 조금 더 키웠습니다 */
        font-weight: 700; 
        color: var(--navy); 
        text-align: center; 
        display: block; 
        margin-bottom: 10px;
    }

    .iching-symbol { font-size: 9rem; color: var(--navy); text-align: center; }
    .hex-full-name { font-size: 2.8rem; font-weight: 900; text-align: center; }
    .report-section { background: #fafafa; padding: 25px; border-radius: 18px; border: 1px solid #f0f0f0; margin-bottom: 20px; }
    .section-title { font-weight: 800; color: var(--navy); font-size: 1.2rem; margin-bottom: 12px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    
    .highlight-box { background: var(--navy); color: #fff; padding: 25px; border-radius: 18px; margin-bottom: 25px; text-align: center; }
    .highlight-box h3 { color: #ffd700; margin: 0 0 10px 0; }

    /* 모바일 최적화 (화면 너비 768px 이하일 때 자동 실행) */
@media screen and (max-width: 768px) {
    /* 0. 차트 및 괘 그림 모바일에서 세로로 배치 (찌그러짐 방지) */
    .result-grid {
        grid-template-columns: 1fr !important;
        gap: 20px !important;
    }

    /* 1. 전체 컨테이너 여백 조정 */
    body, .container { 
        padding: 15px !important; 
    }

    /* 2. 모든 섹션의 패딩과 마진 축소 (답답함 해소) */
    .report-section { 
        padding: 25px 20px !important; 
        margin-bottom: 40px !important; 
        border-radius: 15px !important;
    }

    /* 3. 제목(섹션 타이틀) 크기 최적화 */
    .section-title { 
        font-size: 1.3rem !important; 
        margin-bottom: 20px !important; 
        }

    /* 4. 본문 글자 크기 (전체적으로 살짝 슬림하게) */
    .detail-item, .zen-content, .advice-content, p { 
        font-size: 1.1rem !important; 
        line-height: 1.5 !important; 
    }

    /* 4-1. 특대형 텍스트 및 로고 최적화 (모바일용 강제 축소) */
    .header h1 {
        font-size: 2.2rem !important;
    }
    .iching-symbol {
        font-size: 5.5rem !important;
    }
    .hex-full-name {
        font-size: 1.8rem !important;
    }
    .q-text {
        font-size: 1.25rem !important;
        padding: 15px 15px 30px 15px !important;
        margin-bottom: 25px !important;
        word-break: break-word !important; /* 모바일에서 글자 잘림 무조건 방지 */
    }

    /* 통합 시너지 카드 모바일 폭 최적화 */
    .potential-synergy-card {
        padding: 20px !important;
        margin-top: 20px !important;
    }
    .omega-bg {
        font-size: 4rem !important;
        top: -5px !important;
        right: -5px !important;
    }
    .synergy-text {
        word-break: break-word !important;
        font-size: 1rem !important;
    }

    /* 5. 궁합 카드(Grid) 세로 정렬 */
    .match-grid { 
        display: block !important; 
    }
    .match-card { 
        margin-bottom: 15px !important; 
        width: 100% !important; 
    }

    /* 6. 질문지(Input/Button) 모바일 대응 */
    input, select, button {
        font-size: 1rem !important;
        padding: 12px !important;
        width: 100% !important; /* 모바일에선 버튼이 꽉 차야 누르기 편해요 */
    }

    /* 1. 차트(캔버스)가 화면 밖으로 나가지 않게 강제 조정 */
    canvas {
        max-width: 100% !important;
        height: auto !important; /* 가로 세로 비율 유지 */
    }

    .chart-outer-wrap {
    width: 92% !important; 
    max-width: 480px;
    margin: 0 auto 50px auto;
    display: block;
    padding: 25px; 
    background: #ffffff;
    border-radius: 24px;
    border: 1px solid #f0f0f0;
    box-sizing: border-box;
    box-shadow: 0 15px 35px rgba(0,0,0,0.03); 
    overflow: hidden; 
}

    /* 2. 괘 그림(이미지) 최적화 */
    .hexagram-img, .chart-wrapper img {
        width: 100% !important;   /* 가로를 꽉 채우되 */
        max-width: 250px !important; /* 모바일에선 너무 크면 부담스러우니 상한선 지정 */
        height: auto !important;
        display: block !important;
        margin: 0 auto 20px !important; /* 가운데 정렬 */
    }

    /* 3. 차트를 감싸는 박스가 있다면 */
    .chart-container {
        width: 100% !important;
        padding: 0 !important;
        overflow: hidden !important; /* 삐져나온 부분 숨김 */
    }

    /* 모바일 최적화 */
    @media (max-width: 600px) {
        .container { padding: 25px 18px !important; width: 94% !important; }
        .logo-area img { max-width: 280px; }
        .q-text { font-size: 1.25rem !important; min-height: 120px !important; }
    }
}
    /* 64괘 에너지 휠 전용 스타일 */
    .wheel-wrapper {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 40px auto;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #E74C3C; 
        box-shadow: 0 15px 40px rgba(0,0,0,0.08);
        overflow: hidden;
    }

    .wheel-pieces {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        z-index: 1;
    }

    .piece {
        position: absolute;
        width: 50%;
        height: 50%;
        left: 50%;
        top: 0;
        transform-origin: 0% 100%;
        clip-path: polygon(0 100%, 10% 0, 0 0); 
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .piece:hover {
        filter: brightness(1.2);
        z-index: 20;
    }

    .wheel-center {
        position: absolute;
        width: 140px; /* 크기 확대 */
        height: 140px;
        background: white;
        border-radius: 50%;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        border: 4px solid #002D62;
        transition: all 0.3s ease;
    }

    .wheel-center .title { 
        font-size: 0.65rem; 
        color: #d63384; 
        font-weight: 800; 
        letter-spacing: 1px;
        margin-bottom: 5px;
    }
    .wheel-center .symbol { 
        font-size: 2.2rem; 
        color: #001a3d; 
        line-height: 1;
        margin-bottom: 2px;
    }
    .wheel-center .name { 
        font-size: 1.05rem; 
        font-weight: 800; 
        color: #1a1a1a; 
    }

    /* 휠 셀렉터 버튼 스타일 */
    .wheel-core-btn {
        padding: 8px 16px;
        border-radius: 20px;
        border: 1px solid #fce4ec;
        background: white;
        color: #d63384;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .wheel-core-btn:hover {
        background: #fff0f5;
        transform: translateY(-2px);
    }
    .wheel-core-btn.active {
        background: #002D62;
        color: white;
        border-color: #002D62;
        box-shadow: 0 4px 10px rgba(0,45,98,0.2);
    }

    @media (max-width: 600px) {
        .wheel-wrapper {
            width: 280px;
            height: 280px;
            margin: 30px auto;
        }
        .wheel-center {
            width: 100px; /* 모바일에서 축소하여 조각 공간 확보 */
            height: 100px;
            border-width: 3px;
        }
        .wheel-center .title { font-size: 0.55rem; }
        .wheel-center .symbol { font-size: 1.6rem; }
        .wheel-center .name { font-size: 0.85rem; }
        .wheel-core-btn {
            padding: 6px 12px;
            font-size: 0.75rem;
        }
    }

    #wheel-selector {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
    }
    .selector-row {
        display: flex;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
        width: 100%;
    }

</style>

// ===== db.js =====

window.trigramInfo = { "건":"111", "태":"011", "리":"101", "진":"001", "손":"110", "감":"010", "간":"100", "곤":"000" };

function displayResult(upperName, lowerName) {
    const upperBinary = trigramInfo[upperName];
    const lowerBinary = trigramInfo[lowerName];
    
    if (!upperBinary || !lowerBinary) return;

    const fullKey = upperBinary + lowerBinary;
    const data = ichingDB[fullKey];

    if (data) {
        // HTML 요소의 ID와 데이터 매칭 (HTML에 이 ID들이 있어야 합니다!)
        document.getElementById('resultName').innerHTML = `${data.symbol} ${data.name}`;
        document.getElementById('resultSummary').innerText = data.summary;
        document.getElementById('resultOneLine').innerText = data.oneLine;
        
        // 상세 내용
        document.getElementById('socialContent').innerText = data.socialAction;
        document.getElementById('innerContent').innerText = data.innerMotive;
        document.getElementById('adviceText').innerText = data.advice;

        // 결과창 보여주기
        document.getElementById('resultContainer').classList.remove('hidden');
    }
}

// 버튼 클릭 이벤트 연결 (HTML의 버튼 ID가 'checkBtn'이라고 가정)
document.getElementById('checkBtn')?.addEventListener('click', () => {
    // 사용자가 선택한 상괘, 하괘 값을 가져옴 (Select 박스 ID 기준)
    const upper = document.getElementById('upperSelect').value;
    const lower = document.getElementById('lowerSelect').value;
    
    displayResult(upper, lower);
});

  "리_건": "태양이 하늘 높이 뜬 형국으로, 사회적 성공(리)과 강력한 자기 질서(건)가 만난 최고의 조합입니다. 하지만 내면의 완벽주의가 '나만이 옳다'는 선민의식으로 변질될 위험이 큽니다. 타인의 성과를 내심 우습게 여기며 독주하는 과정에서 주변의 적을 만드는 '오만한 제왕'의 역동을 경계해야 합니다.",

  // 2. 리(상) + 곤(하) : 화지진 (The Altruistic Performer)
  "리_곤": "대지(곤) 위에 밝은 빛(리)이 내리쬐니, 타인을 위해 헌신하며 자신의 존재감을 증명하는 형국입니다. 사회적으로는 대단히 자애롭고 유능한 리더로 칭송받지만, 내면은 '남들의 기대에 부응해야 한다'는 강박에 시달리고 있습니다. 자신의 빛으로 남을 비추느라 정작 본인은 어둠 속에 방치된 '자기 소멸적 열정'이 관찰됩니다.",

  // 3. 리(상) + 감(하) : 화수미제 (The Anxious Perfectionist)
  "리_감": "겉은 화려한 불(리)인데 속은 차가운 물(감)입니다. 남들에게는 완벽하고 지적인 모습을 보여주려 애쓰지만, 내면은 언제 무너질지 모르는 불안의 심연에 빠져 있습니다. 겉모습을 유지하기 위해 쏟는 에너지가 너무 커서 늘 번아웃 직전의 상태이며, 자신의 취약함을 들킬까 봐 전전긍긍하는 '유리 멘탈'의 역동입니다.",

  // 4. 리(상) + 리(하) : 중화리 (The Burning Burnout)
  "리_리": "안팎이 모두 불꽃으로 타오르니, 열정과 지성이 극에 달한 상태입니다. 그러나 멈출 줄 모르는 자기 과시와 활동 에너지가 스스로의 심지를 다 태워버리고 있습니다. 박수갈채가 멈춘 뒤에 찾아오는 지독한 공허함을 견디지 못하며, 끊임없이 새로운 자극을 찾아 헤매는 '정서적 중독' 상태에 빠지기 쉽습니다.",

  // 5. 리(상) + 진(하) : 화뢰서합 (The Aggressive Reformer)
  "리_진": "밝은 지성(리)과 폭발적인 행동력(진)이 결합하여 세상을 뒤집으려 합니다. 옳고 그름이 너무 명확하여 타인의 실수를 용납하지 못하고 즉각적인 단죄나 수정을 요구합니다. 정의감으로 포장된 내면의 공격성이 주변 사람들에게는 '공포의 대상'이 될 수 있으며, 자신의 분노를 혁신이라는 이름으로 합리화하는 경향이 강합니다.",

  // 6. 리(상) + 손(하) : 화풍정 (The Diplomatic Idealist)
  "리_손": "화려한 언변(리)과 유연한 소통 능력(손)이 만나 최고의 사교적 매력을 발산합니다. 사람들의 마음을 얻는 법을 알지만, 내면은 바람처럼 흔들리며 확실한 주관이 결여되어 있습니다. 대세를 따르며 실리를 챙기는 데 능하나, 정작 중요한 순간에 책임을 피하려는 회피적 성향이 강해 '말만 번지르르한 사람'이라는 오해를 사기 쉽습니다.",

  // 7. 리(상) + 간(하) : 화산려 (The Lonely Traveler)
  "리_간": "산 위에서 타오르는 불처럼 화려하지만 고립되어 있습니다. 사회적 지위와 명예(리)는 높으나 내면의 문을 굳게 닫고(간) 누구의 접근도 허용하지 않습니다. '아무도 나를 이해하지 못한다'는 엘리트 의식과 고독이 뒤섞여 있으며, 타인과의 정서적 연결보다 자신의 지적 세계를 지키는 데만 몰두하는 '고고한 외톨이'의 모습입니다.",

  // 8. 리(상) + 태(하) : 화택규 (The Narcissistic Victim)
  "리_태": "겉으로는 밝고 쾌활한 스타(리)이지만, 내면은 채워지지 않는 결핍과 서운함(태)으로 가득 차 있습니다. 남들이 나를 대접해주지 않으면 금세 토라지거나 피해 의식을 느끼는 어린아이 같은 자아가 숨어 있습니다. 칭찬에 지나치게 의존하며, 작은 비판에도 자존감이 바닥으로 곤두박질치는 '애정 결핍형 완벽주의'를 보입니다.",

  // 1. 진(상) + 건(하) : 뇌천대장 (The Overpowering Crusader)
  "진_건": "폭발적인 행동력(진)과 강철 같은 자아(건)가 만난 '불도저'형 역동입니다. 목표를 정하면 앞뒤 재지 않고 돌진하는 저력이 있으나, 타인의 감정이나 세밀한 절차를 무시하는 독단이 매우 강합니다. 자신의 힘을 과신하여 주변을 압도하려다 정작 중요한 인적 자산을 잃게 되는 '폭주하는 리더'의 전형입니다.",

  // 2. 진(상) + 곤(하) : 뇌지예 (The Enthusiastic Visionary)
  "진_곤": "겉으로는 세상을 뒤흔들 듯 화려하게 움직이지만(진), 내면은 타인의 지지와 인정을 갈구하는 수용성(곤)으로 가득 차 있습니다. 사람들을 선동하고 분위기를 띄우는 데 능하지만, 정작 본인은 그 열기 속에서 길을 잃기 쉽습니다. 실속보다는 명분에 치중하며 '보여주기식 성과'에 집착하는 과시적 역동이 보입니다.",

  // 3. 진(상) + 감(하) : 뇌수해 (The Relieved Escapee)
  "진_감": "벼락(진)이 쳐서 얼어붙은 물(감)을 녹이는 형국입니다. 오랫동안 품어온 불안과 억눌린 감정을 한꺼번에 터뜨리며 해소하려는 역동이 강합니다. 위기 상황에서 탈출하는 순발력은 뛰어나나, 근본적인 문제를 해결하기보다 당장의 답답함을 해소하기 위한 충동적 선택을 반복하는 '회피형 행동가'의 모습입니다.",

  // 4. 진(상) + 리(하) : 뇌화풍 (The Arrogant Radiant)
  "진_진": "압도적인 에너지(진)와 명석한 두뇌(리)가 결합하여 전성기를 구사합니다. 자신이 가장 잘났다는 확신이 극에 달해 있어 주변의 충고를 소음으로 여깁니다. 화려한 성공 뒤에 숨겨진 내면의 공허를 보지 못하고 더 큰 자극과 승부욕에 매몰되어 가며, 결국 스스로 만든 화려함에 눈이 멀어버리는 '오만한 승리자'의 역동입니다.",

  // 5. 진(상) + 진(하) : 중뢰진 (The Anxious Agitator)
  "진_진": "안팎으로 천둥이 치니 한시도 가만히 있지 못하는 과잉 행동과 불안이 공존합니다. 끊임없이 새로운 일을 벌여야만 생존감을 느끼지만, 정작 실속 있게 마무리하는 뒷심은 부족합니다. 내면의 정서적 소란을 외부의 분주함으로 덮으려 하는 '불안형 워커홀릭'으로, 늘 무언가에 쫓기는 듯한 삶을 삽니다.",

  // 6. 진(상) + 손(하) : 뇌풍항 (The Conservative Rebel)
  "진_손": "겉은 혁명가(진)처럼 요란하지만 속은 바람(손)처럼 유연하게 현실과 타협하고 있습니다. 변화를 외치면서도 정작 자신의 기득권이나 익숙한 습관은 절대 놓지 않는 모순적인 태도를 보입니다. 겉모양만 바꾸는 '무늬만 혁신'에 그치기 쉬우며, 책임질 상황이 오면 부드럽게 빠져나가는 기회주의적 역동이 숨어 있습니다.",

  // 7. 진(상) + 간(하) : 뇌산소과 (The Defensive Aggressor)
  "진_간": "거침없는 행동(진) 뒤에 완고한 자기만의 성벽(간)을 쌓고 있습니다. 타인의 접근을 막기 위해 오히려 선제공격을 하거나 과격한 반응을 보이는 방어적 공격성이 특징입니다. 겉으로는 강해 보이고 싶어 하지만 속으로는 상처받기 싫어 문을 걸어 잠근 '겁 많은 사자'의 형국으로, 소통의 부재가 심각합니다.",

  // 8. 진(상) + 태(하) : 뇌택귀매 (The Impulsive Pleasure-seeker)
  "진_태": "벼락같은 추진력(진)의 목적이 내면의 즐거움과 욕망(태)을 채우는 데 쏠려 있습니다. 자신의 쾌락을 위해 규칙을 어기거나 성급하게 관계를 맺는 충동적 성향이 강합니다. 결과보다 과정의 짜릿함에 집착하며, '재미없으면 안 한다'는 유아기적 사고가 성인기 자아를 지배하고 있는 역동을 보입니다.",

   // 1. 손(상) + 건(하) : 풍천소축 (The Subtle Controller)
  "손_건": "겉으로는 한없이 유연하고 공순(손)해 보이지만, 내면에는 하늘(건) 같은 강한 자의식과 지배욕이 도사리고 있습니다. 강압적인 명령 대신 '가스라이팅'에 가까운 부드러운 설득으로 상대를 자신의 뜻대로 움직이려는 고도의 통제 전략을 구사하는 '은밀한 권력자'의 역동입니다.",

  // 2. 손(상) + 곤(하) : 풍지관 (The Detached Observer)
  "손_곤": "바람(손)이 대지(곤) 위를 훑고 지나가듯, 세상만사를 관조하며 자신을 드러내지 않습니다. 타인의 고통이나 상황에 깊이 공감하는 척하지만, 사실은 감정적으로 엮이는 것을 극도로 꺼리는 '냉소적인 관찰자'의 모습입니다. 책임질 상황이 오면 바람처럼 사라져버리는 회피적 태도가 강합니다.",

  // 3. 손(상) + 감(하) : 풍수환 (The Emotional Dissolver)
  "손_감": "부드러운 바람(손)이 얼어붙은 마음의 벽(감)을 녹여 흩뜨리는 형국입니다. 막힌 상황을 뚫어내는 유연함은 좋으나, 정작 본인의 자아마저 흐릿해지는 '경계선 혼란'을 겪기 쉽습니다. 자신의 주관 없이 타인의 감정에 휩쓸리며 에너지를 낭비하는 '정서적 낭비'의 역동이 관찰됩니다.",

  // 4. 손(상) + 리(하) : 풍화가인 (The Image Maker)
  "손_리": "바람(손)이 불(리)을 부채질하여 밝게 빛나니, 사회적 평판과 이미지를 관리하는 데 천재적입니다. 겉으로는 화목하고 지적인 완벽한 모습을 보여주려 애쓰지만, 내면은 타인의 시선에 극도로 예민한 '평판 강박'에 시달리고 있습니다. 보여주기 위한 삶을 사느라 정작 본인의 진실한 욕구는 외면당하고 있습니다.",

  // 5. 손(상) + 진(하) : 풍뢰익 (The Calculated Opportunist)
  "손_진": "유연한 소통(손)의 이면에 벼락같은 욕망과 추진력(진)을 감추고 있습니다. 실리를 챙기는 감각이 매우 탁월하여 자신에게 이득이 되는 방향으로 바람의 방향을 바꾸는 데 능합니다. '윈윈(Win-Win)'을 외치지만 사실은 철저히 자신의 몫을 먼저 계산하는 '영리한 현실주의자'의 모습입니다.",

  // 6. 손(상) + 손(하) : 중풍손 (The Chronic Vacillator)
  "손_손": "안팎이 모두 바람이니 끊임없이 흔들리며 중심을 잡지 못합니다. 주변의 모든 정보와 의견에 과도하게 순응하느라 자신의 목소리를 잃어버린 상태입니다. 결정을 미루는 것이 배려라고 착각하지만, 사실은 책임에 대한 공포 때문에 '수동적 공격성'을 띠며 주변 사람들을 지치게 만드는 역동을 보입니다.",

  // 7. 손(상) + 간(하) : 풍산점 (The Cautious Perfectionist)
  "손_간": "산(간) 위에 나무(손)가 자라듯 대단히 신중하고 단계적인 태도를 보입니다. 겉으로는 조화를 중시하지만 속으로는 자신만의 엄격한 원칙과 경계선이 명확하여 타인의 진입을 쉽게 허용하지 않습니다. '돌다리도 두드려보고 안 건너는' 식의 과도한 신중함이 성장의 발목을 잡는 '정체된 완벽주의'를 보입니다.",

  // 8. 손(상) + 태(하) : 풍택중부 (The Sincere Manipulator)
  "손_태": "부드러운 말(손)로 상대의 마음(태)을 얻는 데 도가 텄습니다. 진심 어린 공감을 하는 듯 보이지만, 무의식적으로는 상대를 조종하여 자신의 정서적 결핍을 채우려는 의도가 숨어 있습니다. '착한 사람'이라는 평가에 중독되어 자신의 어두운 욕망을 부정(Denial)하는 위선적인 역동이 보입니다.",

    // 1. 간(상) + 건(하) : 산천대축 (The Stoic Controller)
  "간_건": "묵직한 산(간) 아래에 하늘(건)을 가둔 형국입니다. 겉으로는 지극히 절제되고 차분해 보이지만, 내면에는 세상을 다 가질 만큼 거대한 야망과 자기 확신이 가득 차 있습니다. 감정을 억압하고 논리와 실력으로 상대를 압도하려는 '철인(哲人)적 지배욕'이 당신을 지탱하는 힘이자 동시에 고립의 원인입니다.",

  // 2. 간(상) + 곤(하) : 산지박 (The Empty Fortress)
  "간_곤": "거대한 산(간)이 대지(곤) 위에 위태롭게 서 있는 형국으로, 사회적 지위나 겉모습을 지키기 위해 내면의 모든 에너지를 소진하고 있습니다. 남들에게 무너지는 모습을 보이기 싫어 침묵으로 일관하지만, 속은 이미 '심리적 파산' 상태에 가깝습니다. 고집스럽게 자존심을 지키려다 주변의 모든 지지 세력을 잃어버리는 '고립무원'의 역동입니다.",

  // 3. 간(상) + 감(하) : 산수몽 (The Naive Wall)
  "간_감": "산(간) 아래에 짙은 안개(감)가 낀 것처럼, 자신의 주관에 갇혀 현실을 제대로 보지 못하고 있습니다. 겉으로는 신중한 척 침묵하지만 사실은 상황 판단이 서지 않아 멍한 상태이거나, 자신의 환상 속에 머물며 타인의 조언을 필터링해버리는 '지적 유아기' 상태에 머물러 있는 역동이 관찰됩니다.",

  // 4. 간(상) + 리(하) : 산화비 (The Aesthetic Narcissist)

    const values = Object.values(data);

/**
 * [내부 엔진] 괘의 순서에 상관없이 DB에서 데이터를 집요하게 찾아냅니다.
 * 원장님 DB가 '곤+감+리'여도 ['리', '감', '곤'] 배열을 넣으면 찾아냄.
 */
function getAtomicData(keys, dbSource) {
    if (!keys || keys.length === 0 || !dbSource) return null;
    
    // 1. 현재 입력된 괘를 집합(Set)으로 변환 (순서 무시)
    const targetSet = new Set(keys.map(k => k.trim()));
    
    // 2. 전달된 dbSource의 모든 키를 전수조사
    const allKeys = Object.keys(dbSource || {});
    
    // 3. 조건에 맞는 후보군 찾기 (3개 매칭, 2개 매칭, 1개 매칭)
    const candidates = [];
    for (const key of allKeys) {
        let dbKeys = key.split('+').map(k => k.trim());
        
        // [추가] db9.js처럼 '+'가 없는 3글자 키(예: "건리손") 대응
        if (dbKeys.length === 1 && key.length === 3) {
            dbKeys = key.split(''); 
        }
        
        // DB의 키가 구성한 모든 괘가 타겟 배열(targetSet) 안에 포함되어야 함
        if (dbKeys.every(k => targetSet.has(k))) {
            candidates.push({
                key: key,
                matchCount: dbKeys.length // 몇 개가 일치했는지 점수 부여
            });
        }
    }
    
    if (candidates.length === 0) return null; // 1개조차도 포함된 게 없으면 실패
    
    // 4. 가장 매칭 수가 많은(길이가 긴) 데이터부터 우선순위 부여 (내림차순 정렬)
    candidates.sort((a, b) => b.matchCount - a.matchCount);
    
    // 최고 점수(Best Match)의 데이터 키를 선택
    const bestMatchKey = candidates[0].key;
    console.log(`[Smart Fallback Match] 대상 조합(${keys.join('+')}) -> 매칭 성공: [${bestMatchKey}] (일치수: ${candidates[0].matchCount})`);
    
    return dbSource[bestMatchKey];
}

/**
 * [휠 차트] 64괘 궁합 에너지 휠 렌더링
 */
function getAllHexagrams() {
    return Object.values(window.ichingDB).map(item => item.name.split(' (')[0].replace(/^\d+\.\s*/, ''));
}

function calculate64Score(myName, targetName) {
    if (myName === targetName) return 100;
    const db = window.ichingDB;
    const myKey = Object.keys(db).find(key => db[key].name.includes(myName));
    const targetKey = Object.keys(db).find(key => db[key].name.includes(targetName));
    if (!myKey || !targetKey) return 50;
    let diff = 0;
    for(let i=0; i<6; i++) { if(myKey[i] !== targetKey[i]) diff++; }
    return 100 - (diff * 10); 
}

function getGradientColor(score) {
    let visualScore = (score - 40) * (100 / 60); 
    if (visualScore < 0) visualScore = 0;
    if (visualScore > 100) visualScore = 100;

    if (visualScore >= 80) return '#3498DB'; // 파랑
    if (visualScore >= 60) return '#2ECC71'; // 초록
    if (visualScore >= 40) return '#F1C40F'; // 노랑
    if (visualScore >= 20) return '#E67E22'; // 주황
    return '#E74C3C';                       // 빨강
}

function showWheelInfo(guaName, score) {
    const infoBox = document.getElementById('wheel-info');
    const db = window.ichingDB;
    if (!db || !infoBox) return;

    let targetGua = null;
    let targetNickname = "기질 분석 중...";

    Object.keys(db).forEach(key => {
        // 이름에 포함되어 있는지 확인 (숫자 제거된 순수 이름 기준)
        const pureDbName = db[key].name.split(' (')[0].replace(/^\d+\.\s*/, '');
        if (pureDbName === guaName) { 
            targetGua = db[key]; 
        }
    });
    
    if (!targetGua) return;

    // 닉네임 매칭 (순수 이름 기준)
    Object.keys(window.ICHING_NICKNAMES).forEach(nkey => {
        if (guaName.includes(nkey)) {
            targetNickname = window.ICHING_NICKNAMES[nkey];
        }
    });

    let vScore = (score - 40) * (100 / 60);
    if (vScore < 0) vScore = 0;

    let status, statusColor;
    if (vScore >= 80) { status = "✅ 최상의 조화"; statusColor = "#3498DB"; }
    else if (vScore >= 60) { status = "🌿 안정적 관계"; statusColor = "#2ECC71"; }
    else if (vScore >= 40) { status = "⚖️ 평범한 관계"; statusColor = "#F1C40F"; }
    else if (vScore >= 20) { status = "⚠️ 서먹한 관계"; statusColor = "#E67E22"; }
    else { status = "🚨 충돌 주의"; statusColor = "#E74C3C"; }

    infoBox.innerHTML = `
        <div style="background:#fff; padding:12px; border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.1); border-bottom:4px solid ${statusColor};">
            <div style="font-size:1.05rem; color:#002D62; font-weight:800; margin-bottom:4px; word-break:keep-all;">
                ${targetGua.symbol} ${guaName} : ${targetNickname}
            </div>
            <div style="font-size:0.95rem; font-weight:700; color:${statusColor};">
                ${status} (${score}점)
            </div>
        </div>
    `;
}

function render64Wheel(userHexaName) {
    const container = document.getElementById('wheel-pieces');
    if (!container) return;

    const allHexas = getAllHexagrams(); 
    const angleStep = 360 / 64;

    let scoredList = allHexas.map(target => ({
        name: target,
        score: calculate64Score(userHexaName, target)
    }));

    scoredList.sort((a, b) => b.score - a.score);

    let html = '';
    scoredList.forEach((item, i) => {
        const color = getGradientColor(item.score);
        const rotation = i * angleStep;
        html += `
            <div class="piece" 
                 style="transform: rotate(${rotation}deg); background: ${color};"
                 onmouseover="showWheelInfo('${item.name}', ${item.score})">
            </div>`;
    });
    
    container.innerHTML = html;
    
    // 센터 정보 업데이트 (심볼 + 이름)
    const wheelCenterName = document.getElementById('wheel-my-name');
    const wheelCenterSymbol = document.getElementById('wheel-my-symbol');
    
    if (wheelCenterName && wheelCenterSymbol) {
        const db = window.ichingDB;
        let symbol = "-";
        Object.keys(db).forEach(key => {
            if (db[key].name.includes(userHexaName)) {
                symbol = db[key].symbol;
            }
        });
        
        wheelCenterSymbol.innerText = symbol;
        wheelCenterName.innerText = userHexaName;
    }
}

        btn.className = 'wheel-core-btn' + (pureName === activeName ? ' active' : '');
        
        let label = hex.label || (hex.isMain ? "기본" : "잠재");
        if (label.includes("관계 스타일")) label = "기본 기질";
        if (label.includes("내면의 변수")) label = "내면 역동";
        if (label.includes("외부적 환경")) label = "환경 역동";
        
        btn.innerHTML = `<span style="display:block; font-size:0.7rem; opacity:0.7; margin-bottom:2px;">${label}</span>${pureName}`;
        btn.onclick = () => changeWheelCore(pureName, btn);
        
        // 레이아웃 배분: 기본 기질은 위로, 나머지는 아래로
        if (hex.isMain) {
            topRow.appendChild(btn);
        } else {
            bottomRow.appendChild(btn);
        }
    });

    selector.appendChild(topRow);
    if (bottomRow.children.length > 0) {
        selector.appendChild(bottomRow);
    }
}

/**
 * 휠 코어 변경 및 재렌더링
 */
function changeWheelCore(hexName, btnElement) {
    // 버튼 활성화 상태 변경
    const buttons = document.querySelectorAll('.wheel-core-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');

    // 휠 재렌더링
    render64Wheel(hexName);
    
    // 안내 메시지 업데이트
}
</script>
