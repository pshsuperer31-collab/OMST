    <style>
    :root { 
        --burgundy: #800020; 
        --bg-light: #ffffff; 
        --text-dark: #2c3e50; 
        /* 시스템 기본 폰트 설정 (따로 저장 안 해도 나오는 폰트) */
        --font-main: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        --font-serif: "AppleMyungjo", "Apple Myungjo", "NanumMyeongjo", "Nanum Myeongjo", "Batang", "serif";
    }

    body {
        margin: 0;
        padding: 0;
        display: block; /* flex 대신 일반 블록으로 변경 */
        background: #f8f9fa;
        overflow-y: auto;
    }

    .container {
    width: 92%;
    max-width: 600px;
    margin: 20px auto 40px auto; /* 좌우 자동 중앙 */
    background: #fff;
    padding: 25px;
    border-radius: 25px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.06);
    text-align: center; /* 내부 텍스트 모두 중앙 */
    
    /* 높이 제한 해제 */
    height: auto !important;
    display: block !important;
    }

    /* 2. 헤더 내부의 위쪽 여백 줄이기 (50px -> 10px) */
#quiz-ui .header {
    padding-top: 10px !important; /* 로고 바로 위 여백 */
    margin-bottom: 30px; 
    text-align: center;
}

/* 3. 결과 영역의 헤더도 동일하게 적용 */
#result-area .header {
    padding-top: 10px !important;
    min-height: 0; /* 불필요한 높이 제거 */
}

    /* [수정] 로고 영역 스타일 */
    .header {
        width: 100%;
        padding: 40px 0 20px 0;
        text-align: center;
        background: #fff;
    }
    
  /* ANALYSIS REPORT 글자 완전 제거 */
    .header h1, .header p { 
        display: none !important; 
    }

.header p { 
    display: none; /* 서브 타이틀 강제 숨김 */

    /* [추가] 로고 이미지 스타일: 중앙에 땋! 위치하고 크기 조절 */
logo-area img {
        width: 100%;
        max-width: 420px;
        height: auto;
        display: block;
        margin: 0 auto;
    }
}

    .logo-img { width: 120px; height: auto; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
    .logo-img:hover { transform: scale(1.05); }

    /* [Mobile Optimization] */

    /* 모바일 전용 로고 크기 조정 */
@media (max-width: 600px) {
    .header { padding: 40px 0 20px 0; }
    .logo-area img { max-width: 280px; } /* 모바일에서는 화면에 맞게 */
}
    @media (max-width: 600px) {
        .container { padding: 25px 18px !important; width: 94% !important; }
        .header h1 { font-size: 2.2rem !important; }
        .header p { font-size: 0.95rem !important; letter-spacing: 3px !important; }
        .res-symbol { font-size: 4.8rem !important; } /* 괘 이미지 대폭 확대 */
        .res-hex-title { font-size: 2.4rem !important; }
        .res-binary { font-size: 0.9rem !important; }
        
        /* 8단계 프로필 및 상세 카드 그리드 강제 2열 */
        .mobile-grid-2 { 
            display: grid !important; 
            grid-template-columns: 1fr 1fr !important; 
            gap: 10px !important; 
        }
        .compact-card { padding: 15px !important; }
        .compact-font { font-size: 0.82rem !important; line-height: 1.5 !important; }
        .compact-title { font-size: 0.8rem !important; margin-bottom: 4px !important; }
    }

    /* [나침반 바늘 & 프로그레스 바] 바늘 움직임 텐션 추가 */
    .progress-wrapper { 
        position: relative; 
        width: 100%; 
        margin: 60px 0 40px 0;
    }
    .progress-container { 
        width: 100%; 
        height: 12px; 
        background: #eee; 
        border-radius: 10px; 
        overflow: hidden; 
    }
    .progress-fill { 
        height: 100%; 
        background: var(--burgundy); 
        width: 0%; 
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    
    .arrow-indicator {
        position: absolute;
        top: -45px;
        left: 0%; /* JS가 이 값을 0% -> 100%로 바꿀 겁니다 */
        transform: translateX(-50%);
        font-size: 32px;
        /* 나침반 바늘처럼 쫀득한 움직임을 주는 텐션 값 */
        transition: left 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); 
        animation: bounce 1.8s infinite;
        z-index: 10;
    }

    @keyframes bounce {
        0%, 100% { transform: translate(-50%, 0); }
        50% { transform: translate(-50%, -10px); }
    }

    /* 2. 질문 영역: 긴 글도 예쁘게 담는 그릇 */
    .q-text { 
        font-family: var(--font-apple-serif); 
        font-size: 1.8rem; 
        font-weight: 600; 
        color: #1a1a1a; 
        line-height: 1.7; /* 행간을 아주 미세하게 줄여 긴 문장의 이질감 해소 */
        letter-spacing: -0.3px; 
        word-break: keep-all; 
        /* 고정 높이 대신 최소 높이만 설정하고 나머지는 유연하게 */
        min-height: 180px; 
        height: auto; 
        padding: 20px 30px 40px 30px; /* 아래쪽 여백을 더 줘서 옵션과 분리 */
        margin-bottom: 45px;
        display: flex; 
        align-items: center; 
        justify-content: center; 
        -webkit-font-smoothing: antialiased;
    }

    /* 질문 텍스트 정렬 */
#question-text {
    text-align: center;
    word-break: break-word; /* 모바일에서 깨짐 방지용 기본 설정 전환 */
    line-height: 1.6;
    margin-bottom: 30px;
}

/* 버튼들을 감싸는 영역을 중앙 정렬 */
#options-container {
    display: flex;
    flex-direction: column; /* 세로로 배치 */
    align-items: center;    /* 가운데 정렬 */
    gap: 15px;              /* 버튼 사이 간격 */
    width: 100%;
}

/* 버튼 자체의 스타일 수정 */
.option-btn {
    width: 100%;
    max-width: 400px;       /* 버튼이 너무 길어지지 않게 제한 */
    text-align: center;
    justify-content: center; /* 내부 텍스트 중앙 */
}

    /* 3. 옵션 버튼 사이의 간격 조정 */
    .options { 
        display: grid; 
        gap: 10px; 
        max-width: 550px; 
        margin: 0 auto 30px auto; /* 하단 이전버튼과 간격 확보 */
    }
    .opt-btn { padding: 18px; border: 1.5px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.2s; font-size: 1.15rem; background: #fff; font-weight: 600; }
    .opt-btn:hover { border-color: var(--burgundy); background: #fff5f5; color: var(--burgundy); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(128,0,32,0.1); }

    /* 결과 페이지 디자인 */
    #result-area {
    display: none; /* 기본은 숨김 */
    width: 100%;
    height: auto !important; /* 높이 제한 해제 */
    min-height: 100vh;
    overflow-y: visible !important; /* 내용이 넘치면 무조건 보여줌 */
    padding-bottom: 50px; /* 맨 밑 버튼이 바닥에 붙지 않게 여백 */
}
/* 리포트 몸통 */
#report-body {
        display: flex;
        flex-direction: column; /* 위에서 아래로 */
        align-items: center;
    }

    #report-body > div {
        width: 100%; /* 각 섹션이 가로를 꽉 채우며 순서대로 배치됨 */
    }
    .result-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: center; margin-bottom: 30px; }

    /* 1. 수식어(질서를 바로잡는...) 크기 키우기 */
    .result-subtitle { 
        font-family: var(--font-serif); 
        font-size: 1.75rem; /* 아주 조금 더 키웠습니다 */
        font-weight: 700; 
        color: var(--burgundy); 
        text-align: center; 
        display: block; 
        margin-bottom: 10px;
    }

    .iching-symbol { font-size: 9rem; color: var(--burgundy); text-align: center; }
    .hex-full-name { font-size: 2.8rem; font-weight: 900; text-align: center; }
    .report-section { background: #fafafa; padding: 25px; border-radius: 18px; border: 1px solid #f0f0f0; margin-bottom: 20px; }
    .section-title { font-weight: 800; color: var(--burgundy); font-size: 1.2rem; margin-bottom: 12px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
    
    .highlight-box { background: var(--burgundy); color: #fff; padding: 25px; border-radius: 18px; margin-bottom: 25px; text-align: center; }
    .highlight-box h3 { color: #ffd700; margin: 0 0 10px 0; }

    /* 모바일 최적화 (화면 너비 768px 이하일 때 자동 실행) */
@media screen and (max-width: 768px) {
    /* 0. 차트 및 괘 그림 모바일에서 세로로 배치 (찌그러짐 방지) */
    .result-grid {
        grid-template-columns: 1fr !important;
        gap: 20px !important;
    }

    /* 1. 전체 컨테이너 여백 조정 */
    body, .container { 
        padding: 15px !important; 
    }

    /* 2. 모든 섹션의 패딩과 마진 축소 (답답함 해소) */
    .report-section { 
        padding: 25px 20px !important; 
        margin-bottom: 40px !important; 
        border-radius: 15px !important;
    }

    /* 3. 제목(섹션 타이틀) 크기 최적화 */
    .section-title { 
        font-size: 1.3rem !important; 
        margin-bottom: 20px !important; 
    }

    /* 4. 본문 글자 크기 (전체적으로 살짝 슬림하게) */
    .detail-item, .zen-content, .advice-content, p { 
        font-size: 1.1rem !important; 
        line-height: 1.5 !important; 
    }

    /* 4-1. 특대형 텍스트 및 로고 최적화 (모바일용 강제 축소) */
    .header h1 {
        font-size: 2.2rem !important;
    }
    .iching-symbol {
        font-size: 5.5rem !important;
    }
    .hex-full-name {
        font-size: 1.8rem !important;
    }
    .q-text {
        font-size: 1.25rem !important;
        padding: 15px 15px 30px 15px !important;
        margin-bottom: 25px !important;
        word-break: break-word !important; /* 모바일에서 글자 잘림 무조건 방지 */
    }

    /* 통합 시너지 카드 모바일 폭 최적화 */
    .potential-synergy-card {
        padding: 20px !important;
        margin-top: 20px !important;
    }
    .omega-bg {
        font-size: 4rem !important;
        top: -5px !important;
        right: -5px !important;
    }
    .synergy-text {
        word-break: break-word !important;
        font-size: 1rem !important;
    }

    /* 5. 궁합 카드(Grid) 세로 정렬 */
    .match-grid { 
        display: block !important; 
    }
    .match-card { 
        margin-bottom: 15px !important; 
        width: 100% !important; 
    }

    /* 6. 질문지(Input/Button) 모바일 대응 */
    input, select, button {
        font-size: 1rem !important;
        padding: 12px !important;
        width: 100% !important; /* 모바일에선 버튼이 꽉 차야 누르기 편해요 */
    }

    /* 1. 차트(캔버스)가 화면 밖으로 나가지 않게 강제 조정 */
    canvas {
        max-width: 100% !important;
        height: auto !important; /* 가로 세로 비율 유지 */
    }

    .chart-outer-wrap {
    width: 92% !important; 
    max-width: 480px; /* 너무 커서 부담스럽지 않게 조절 */
    margin: 0 auto 50px auto;
    padding: 25px; 
    background: #ffffff;
    border-radius: 24px;
    border: 1px solid #f0f0f0;
    box-sizing: border-box; /* 패딩이 너비 안에 포함되게 함 */
    box-shadow: 0 15px 35px rgba(0,0,0,0.03); 
    overflow: hidden; 
}

    /* 2. 괘 그림(이미지) 최적화 */
    .hexagram-img, .chart-wrapper img {
        width: 100% !important;   /* 가로를 꽉 채우되 */
        max-width: 250px !important; /* 모바일에선 너무 크면 부담스러우니 상한선 지정 */
        height: auto !important;
        display: block !important;
        margin: 0 auto 20px !important; /* 가운데 정렬 */
    }

    /* 3. 차트를 감싸는 박스가 있다면 */
    .chart-container {
        width: 100% !important;
        padding: 0 !important;
        overflow: hidden !important; /* 삐져나온 부분 숨김 */
    }

    /* 모바일 최적화 */
    @media (max-width: 600px) {
        .container { padding: 25px 18px !important; width: 94% !important; }
        .logo-area img { max-width: 280px; }
        .q-text { font-size: 1.25rem !important; min-height: 120px !important; }
    }
}

</style>

<div class="container">
    <div id="quiz-ui">
    <div class="header" style="padding-top: 50px; margin-bottom: 40px; text-align: center;">
        <img src="Omst_Logo_final.svg" alt="OMST Logo" style="width: 95%; max-width: 500px; height: auto; display: block; margin: 0 auto;">
        
        <p style="margin: 15px 0 0 0; color: #546E7A; font-family: 'Arial', sans-serif; font-size: 0.95rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 300;">
            Decode Your Innate Blueprint
        </p>
    </div>

    <div class="progress-wrapper" style="margin: 20px 0 40px 0;">
        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
    </div>

        <div id="q-container"></div>
    </div>

    <div id="result-area" style="display:none;">
    <div class="header"></div>
    <div id="report-body"></div> 
    
    <div style="text-align:center; margin-top:30px;">
        <button onclick="location.reload()" style="padding:15px 40px; background:var(--burgundy); color:#fff; border:none; border-radius:12px; cursor:pointer; font-weight:bold; font-size:1.1rem;">테스트 다시 하기</button>
    </div>
</div>
</div>

<script>
    // 1. [추가] Fisher-Yates 셔플 알고리즘 함수 (스크립트 최상단에 배치)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 질문 데이터 (기존과 동일하므로 로직만 유지)
    const questions = [
    // --- 1. [건(乾): 주도/완벽] ---
    { type: "outer", trigram: "건", weight: 1.2, text: "어떤 집단에 가든 내 목소리가 영향력을 발휘하고 중심이 되어야 직성이 풀린다." },
    { type: "inner", trigram: "건", text: "타인이 보지 않는 곳에서도 스스로에게 엄격한 기준을 적용하며 자신을 채찍질한다." },
    { type: "outer", trigram: "건", text: "운전 시 앞차가 흐름을 방해하면 주저 없이 리드하며 상황을 제어하려 한다." }, // 운전습관
    { type: "inner", trigram: "건", weight: 1.2, text: "실패를 용납하는 것이 매우 힘들며, 항상 최고여야 한다는 내적 압박을 느낀다." }, // 위기관리
    { type: "outer", trigram: "건", text: "단체에서 최종 의사결정과 책임을 맡는 리더 역할을 맡을 때 에너지가 솟는다." },
    { type: "inner", trigram: "건", text: "누구의 도움 없이 내 능력만으로 문제를 해결했을 때 가장 큰 존재감을 느낀다." },
    { type: "outer", trigram: "건", weight: 1.5, text: "중요한 협상에서 내 페이스를 끝까지 유지하여 상대의 승낙을 받아내는 편이다." },
    { type: "inner", trigram: "건", text: "한 번 정한 목표는 주변의 만류에도 불구하고 끝까지 밀어붙이는 강한 독립심이 있다." },
    { type: "outer", trigram: "건", weight: -0.5, text: "나는 남의 지시를 따르는 조력자 역할이 훨씬 마음 편하고 좋다." }, // [감점] 건 기질 반대

    // --- 2. [태(兌): 소통/기쁨] ---
    { type: "outer", trigram: "태", weight: 1.2, text: "가식 없는 웃음과 재치 있는 입담으로 주변 분위기를 즉각적으로 밝게 만든다." },
    { type: "inner", trigram: "태", text: "지적인 깨달음이나 소소한 감동을 누군가와 공유하지 못하면 답답함을 느낀다." },
    { type: "outer", trigram: "태", text: "카톡 단톡방에서 이모티콘과 리액션으로 대화의 흐름을 유쾌하게 주도한다." }, // 카톡답장
    { type: "inner", trigram: "태", text: "사람들의 아픔을 위로해 줄 때 내 영혼도 함께 치유받는다는 느낌을 받는다." },
    { type: "outer", trigram: "태", text: "딱딱한 회의 환경에서도 유머를 던져 긴장을 해소하고 소통을 돕는 편이다." },
    { type: "inner", trigram: "태", weight: 1.2, text: "혼자 있을 때보다 속마음을 온전히 털어놓을 수 있는 대화 상대를 만날 때 생기가 돈다." },
    { type: "outer", trigram: "태", text: "처음 보는 사람과도 금방 친해지며, 낯선 여행지에서도 현지인과 거리낌 없이 대화한다." }, // 여행스타일
    { type: "inner", trigram: "태", text: "예술적 감성이나 맛있는 음식을 즐기는 것에서 인생의 큰 가치를 찾는다." },
    { type: "outer", trigram: "태", weight: -0.5, text: "사람들과 어울리는 것보다 혼자서 침묵을 지킬 때 더 에너지가 충전된다." }, // [감점] 태 기질 반대

   function renderEnergyChart(canvasId, outerPcts, innerPcts) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

 const normalize = (data) => {
    const values = Object.values(data);
    const maxVal = Math.max(...values);
    const minVal = Math.min(...values);
    const avgVal = values.reduce((a, b) => a + b, 0) / values.length;

    if (maxVal === 0) return values;

    // 편차(에너지의 선명도) 계산
    const deviation = maxVal - minVal;

    // [핵심 로직] 
    // 1. 점수들이 너무 비슷하면(편차가 작으면) 최대치를 75% 선으로 제한하여 몰림 방지
    // 2. 특정 점수가 압도적이면(편차가 크면) 95% 선까지 확장하여 특징 부각
    let limit;
    if (deviation < 5) limit = 70;      // 점수가 다 비슷비슷할 때 (뭉쳐 보임 방지)
    else if (deviation < 15) limit = 85; // 적당히 차이 날 때
    else limit = 95;                    // 기질이 뚜렷할 때

    return values.map(v => (v / maxVal) * limit);
};

    const fullOuter = normalize(outerPcts);
    const fullInner = normalize(innerPcts);

    // 2. 기존 차트가 있다면 업데이트, 없으면 새로 생성
    if (window.myRadarChart) {
        window.myRadarChart.data.datasets[0].data = fullOuter;
        window.myRadarChart.data.datasets[1].data = fullInner;
        window.myRadarChart.update();
        return;
    }

   window.myRadarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['乾', '兌', '離', '震', '巽', '坎', '艮', '坤'],
            datasets: [
                {
                    label: 'Persona (상괘)',
                    data: fullOuter,
                    borderColor: '#800020',
                    backgroundColor: 'rgba(128, 0, 32, 0.1)',
                    borderWidth: 3,
                    pointRadius: 2 
                                    },

                    borderColor: '#4A90E2',
                    backgroundColor: 'rgba(74, 144, 226, 0.1)',
                    borderWidth: 3,
                    pointRadius: 2
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { top: 10, bottom: 10 } }, // 캔버스 끝까지 활용
            scales: {
                r: {
                    min: 0,
                    max: 100, // 환산했으므로 100이 끝입니다.

/**
 * [내부 엔진] 괘의 순서에 상관없이 DB에서 데이터를 집요하게 찾아냅니다.
 * 원장님 DB가 '곤+감+리'여도 ['리', '감', '곤'] 배열을 넣으면 찾아냄.
 */
function getAtomicData(keys, dbSource) {
    if (!keys || keys.length === 0 || !dbSource) return null;
    
    // 1. 현재 입력된 괘를 집합(Set)으로 변환 (순서 무시)
    const targetSet = new Set(keys.map(k => k.trim()));
    
    // 2. 전달된 dbSource의 모든 키를 전수조사
    const allKeys = Object.keys(dbSource || {});
    
    // 3. 조건에 맞는 후보군 찾기 (3개 매칭, 2개 매칭, 1개 매칭)
    const candidates = [];
    for (const key of allKeys) {
        let dbKeys = key.split('+').map(k => k.trim());
        
        // [추가] db9.js처럼 '+'가 없는 3글자 키(예: "건리손") 대응
        if (dbKeys.length === 1 && key.length === 3) {
            dbKeys = key.split(''); 
        }
        
        // DB의 키가 구성한 모든 괘가 타겟 배열(targetSet) 안에 포함되어야 함
        if (dbKeys.every(k => targetSet.has(k))) {
            candidates.push({
                key: key,
                matchCount: dbKeys.length // 몇 개가 일치했는지 점수 부여
            });
        }
    }
    
    if (candidates.length === 0) return null; // 1개조차도 포함된 게 없으면 실패
    
    // 4. 가장 매칭 수가 많은(길이가 긴) 데이터부터 우선순위 부여 (내림차순 정렬)
    candidates.sort((a, b) => b.matchCount - a.matchCount);
    
    // 최고 점수(Best Match)의 데이터 키를 선택
    const bestMatchKey = candidates[0].key;
    console.log(`[Smart Fallback Match] 대상 조합(${keys.join('+')}) -> 매칭 성공: [${bestMatchKey}] (일치수: ${candidates[0].matchCount})`);
    
    return dbSource[bestMatchKey];
